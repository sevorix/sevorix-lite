name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          # To add more targets in the future, append entries here, e.g.:
          # - target: aarch64-unknown-linux-gnu
          #   arch: aarch64
          #   use_cross: true
          # - target: x86_64-apple-darwin
          #   arch: x86_64
          #   os: macos
          #   runs_on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features ebpf --target ${{ matrix.target }}

      - name: Verify binaries
        run: |
          test -f target/${{ matrix.target }}/release/sevorix_watchtower  || (echo "❌ sevorix_watchtower not found" && exit 1)
          test -f target/${{ matrix.target }}/release/sevsh                || (echo "❌ sevsh not found" && exit 1)
          test -f target/${{ matrix.target }}/release/sevorix-ebpf-daemon  || (echo "❌ sevorix-ebpf-daemon not found" && exit 1)

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          BUNDLE_DIR="sevorix-${VERSION}-${{ matrix.arch }}-linux"
          ARCHIVE="${BUNDLE_DIR}.tar.gz"

          mkdir -p "${BUNDLE_DIR}/scripts"

          cp target/${{ matrix.target }}/release/sevorix_watchtower  "${BUNDLE_DIR}/sevorix"
          cp target/${{ matrix.target }}/release/sevsh                "${BUNDLE_DIR}/sevsh"
          cp target/${{ matrix.target }}/release/sevorix-ebpf-daemon  "${BUNDLE_DIR}/sevorix-ebpf-daemon"
          cp install-binary.sh                                         "${BUNDLE_DIR}/install-binary.sh"
          cp scripts/sevorix-cgroup-helper                             "${BUNDLE_DIR}/scripts/sevorix-cgroup-helper"
          cp scripts/sevorix-claude-launcher                           "${BUNDLE_DIR}/scripts/sevorix-claude-launcher"

          chmod +x "${BUNDLE_DIR}/sevorix"
          chmod +x "${BUNDLE_DIR}/sevsh"
          chmod +x "${BUNDLE_DIR}/sevorix-ebpf-daemon"
          chmod +x "${BUNDLE_DIR}/install-binary.sh"
          chmod +x "${BUNDLE_DIR}/scripts/sevorix-cgroup-helper"
          chmod +x "${BUNDLE_DIR}/scripts/sevorix-claude-launcher"

          tar czf "${ARCHIVE}" "${BUNDLE_DIR}"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish release assets
        run: |
          # Create the release if it doesn't exist yet (e.g. workflow-triggered).
          # If it was already created manually, skip creation and just attach assets.
          gh release create "${{ github.ref_name }}" \
            --title "Sevorix Lite ${{ github.ref_name }}" \
            --generate-notes \
            *.tar.gz *.tar.gz.sha256 \
          || gh release upload "${{ github.ref_name }}" \
            --clobber \
            *.tar.gz *.tar.gz.sha256
        env:
          GH_TOKEN: ${{ github.token }}
