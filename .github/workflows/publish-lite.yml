name: Publish Lite

on:
  push:
    branches: [ "main" ]

# Cancel in-progress runs for the same branch
concurrency:
  group: publish-lite-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-lite:
    name: Publish Lite to Private Staging
    runs-on: self-hosted

    steps:
      - name: Checkout source repository (private)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Strip Pro-only features
        run: |
          echo "Stripping Pro-only features for Lite distribution..."

          # Run the stripping script
          python scripts/strip_pro_features.py

          # Verify src/jury.rs is removed
          if [ -f "src/jury.rs" ]; then
            echo "::error::src/jury.rs was not removed - aborting"
            exit 1
          fi

          echo "Pro features stripped successfully"

      - name: Verify no Pro code remains
        run: |
          echo "Verifying no Pro-specific code remains..."

          # Check for jury references
          if grep -r "jury" src/ --include="*.rs" | grep -v "// jury" | grep -v "# jury"; then
            echo "::warning::Found 'jury' references in source files - review needed"
          fi

          # Check for cfg(feature = "pro") blocks
          if grep -r '#\[cfg(feature = "pro")\]' src/ --include="*.rs"; then
            echo "::error::Found remaining #[cfg(feature = \"pro\")] blocks"
            exit 1
          fi

          echo "Verification complete"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Lite edition
        run: |
          cargo build --release
          cargo test --workspace

      - name: Clone lite repository
        run: |
          TOKEN=$(echo -n "${{ secrets.LITE_REPO_TOKEN }}" | tr -d '[:space:]')
          rm -rf /tmp/sevorix-lite
          git clone https://x-access-token:${TOKEN}@github.com/sevorix/sevorix-lite.git /tmp/sevorix-lite

      - name: Sync stripped files to lite repository
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='lite/' \
            --exclude='.beads/' \
            --exclude='plan.md' \
            --exclude='CLAUDE.md' \
            --exclude='AGENTS.md' \
            --exclude='PRODUCT_LITE.md' \
            --exclude='docs/SEVORIX_LITE.md' \
            . /tmp/sevorix-lite/

      - name: Commit and push to lite repository
        run: |
          cd /tmp/sevorix-lite
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "lite: sync from watchtower ${{ github.sha }}" || echo "No changes to commit"
          TOKEN=$(echo -n "${{ secrets.LITE_REPO_TOKEN }}" | tr -d '[:space:]')
          git push https://x-access-token:${TOKEN}@github.com/sevorix/sevorix-lite.git HEAD:main
          echo "Pushed stripped Lite version to sevorix/sevorix-lite"

      - name: Summary
        run: |
          echo "### Lite Publishing Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target: sevorix/sevorix-lite (private)" >> $GITHUB_STEP_SUMMARY
          echo "- Pro features removed: jury.rs, cfg(pro) blocks" >> $GITHUB_STEP_SUMMARY
          echo "- Build: verified with \`cargo build --release\`" >> $GITHUB_STEP_SUMMARY