<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevorix Watchtower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>body { background-color: #020617; color: #e2e8f0; font-family: monospace; }</style>
</head>
<body class="p-4 max-w-md mx-auto">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-xl font-bold text-cyan-400 tracking-widest">SEVORIX</h1>
            <p class="text-xs text-slate-500">RUNTIME CONTAINMENT ENGINE</p>
        </div>
        <div class="h-3 w-3 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
    </div>

    <div x-data="watchtower()" x-init="connect()" class="space-y-3">
        <template x-for="event in events" :key="event.timestamp">
            <div class="p-3 rounded border-l-4 bg-slate-900 transition-all duration-300"
                 :class="{
                    'border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.2)]': event.lane === 'RED',
                    'border-yellow-400': event.lane === 'YELLOW',
                    'border-green-500': event.lane === 'GREEN'
                 }">
                <div class="flex justify-between items-start">
                    <span class="font-bold text-lg" 
                          :class="{
                            'text-red-500': event.lane === 'RED',
                            'text-yellow-400': event.lane === 'YELLOW',
                            'text-green-500': event.lane === 'GREEN'
                          }" x-text="event.verdict"></span>
                    <span class="text-xs text-slate-600" x-text="event.lane + ' LANE'"></span>
                </div>
                <div class="mt-2 text-sm text-slate-300 break-words">
                    <span class="text-slate-500">></span> <span x-text="event.payload"></span>
                </div>
            </div>
        </template>
        <div x-show="events.length === 0" class="text-center text-slate-600 mt-10">
            System Active. Waiting for traffic...
        </div>
    </div>

    <script>
        function watchtower() {
            return {
                events: [],
                connect() {
                    const ws = new WebSocket("ws://localhost:3000/ws");
                    ws.onmessage = (msg) => {
                        this.events.unshift(JSON.parse(msg.data));
                        if (this.events.length > 50) this.events.pop();
                    };
                    ws.onclose = () => setTimeout(() => this.connect(), 1000);
                }
            }
        }
    </script>
</body>
</html>
