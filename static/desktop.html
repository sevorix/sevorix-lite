<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevorix Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        function watchtower() {
            return {
                // ── Live strip (WebSocket) ──────────────────────────────────
                // Small per-layer rolling buffers; never mixes with history.
                _live: { shell: [], syscall: [], network: [] },
                LIVE_PER_LAYER: 20,

                get liveEvents() {
                    return [...this._live.shell, ...this._live.syscall, ...this._live.network]
                        .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
                },

                // ── History panel (query engine) ────────────────────────────
                historyEvents: [],
                historyTotal: 0,
                historyPage: 1,
                historyTotalPages: 1,
                historyLimit: 50,
                historyLoading: false,

                // ── Session switcher ─────────────────────────────────────────
                sessions: [],
                selectedSession: null,
                sessionsLoading: false,
                currentSessionName: '',
                currentSessionPort: 3000,
                currentSessionRole: '',
                runningSessionsCount: 0,

                // ── Intervention panel ──────────────────────────────────────
                pendingRequests: [],

                // ── Shared UI state ─────────────────────────────────────────
                activeTab: 'history',   // 'live' | 'history'
                selected: null,
                stats: { total: 0, blocked: 0, latency: 0, shell: 0, syscall: 0, network: 0 },
                edition: 'pro',
                search: '',
                filters: { shell: true, syscall: true, network: true },
                showBlockedOnly: false,
                _searchDebounce: null,

                get displayEvents() {
                    const events = this.activeTab === 'live' ? this.liveEvents : this.historyEvents;
                    if (this.showBlockedOnly) {
                        return events.filter(e => e.lane === 'RED' || e.verdict === 'BLOCK');
                    }
                    return events;
                },

                // ── Live helpers ────────────────────────────────────────────
                _addLive(data) {
                    const layer = (data.layer || 'shell').toLowerCase();
                    const bucket = layer === 'syscall' ? 'syscall'
                                 : layer === 'network' ? 'network' : 'shell';
                    this._live[bucket].unshift(data);
                    if (this._live[bucket].length > this.LIVE_PER_LAYER)
                        this._live[bucket].pop();
                },

                // ── Stats ────────────────────────────────────────────────────
                loadStats() {
                    fetch('/api/stats')
                        .then(r => r.json())
                        .then(data => {
                            this.stats.total   = data.total   || 0;
                            this.stats.blocked = data.blocked || 0;
                            this.stats.latency = data.avg_latency || 0;
                            this.stats.shell   = data.shell   || 0;
                            this.stats.syscall = data.syscall || 0;
                            this.stats.network = data.network || 0;
                        })
                        .catch(() => {});
                },

                // ── Session switcher ─────────────────────────────────────────
                loadSessions() {
                    this.sessionsLoading = true;
                    fetch('/api/sessions')
                        .then(r => r.json())
                        .then(data => {
                            this.sessions = data.sessions || [];
                            this.currentSessionName = data.current_session_name || '';
                            this.currentSessionPort = data.current_session_port || 3000;
                            this.currentSessionRole = data.current_session_role || '';
                            this.runningSessionsCount = data.running_sessions_count || 0;
                            if (this.selectedSession === null && data.current_session) {
                                this.selectedSession = data.current_session;
                                // Re-query history now that we have the correct session UUID —
                                // the initial queryHistory fired before this resolved.
                                this.queryHistory(1);
                            }
                            this.sessionsLoading = false;
                        })
                        .catch(() => { this.sessionsLoading = false; });
                },

                // Human-readable label for a session entry in the dropdown.
                sessionLabel(s) {
                    const name = s.name || s.session_id.substring(0, 8) + '…';
                    const indicator = s.is_current ? '● ' : (s.is_running ? '◉ ' : '○ ');
                    const role = s.role ? ` [${s.role}]` : '';
                    const port = s.port ? `:${s.port}` : '';
                    const count = ` (${s.event_count} events`;
                    const ts = s.started_at ? `, ${(s.started_at || '').replace('T', ' ').substring(0, 16)}` : '';
                    return `${indicator}${name}${port}${role}${count}${ts})`;
                },

                // ── History query ───────────────────────────────────────────
                queryHistory(page) {
                    this.historyPage = page || this.historyPage;
                    this.historyLoading = true;

                    const params = new URLSearchParams({ page: this.historyPage, limit: this.historyLimit });
                    const activeKeys = Object.entries(this.filters).filter(([, v]) => v).map(([k]) => k);
                    const activeLayers = activeKeys.join(',');
                    const allLayers = 'shell,syscall,network';
                    if (activeLayers && activeLayers !== allLayers) {
                        params.set('layer', activeLayers);
                    }
                    if (this.search.trim()) params.set('search', this.search.trim());
                    if (this.showBlockedOnly) params.set('lane', 'RED');
                    if (this.selectedSession) params.set('session', this.selectedSession);

                    fetch('/api/events?' + params)
                        .then(r => r.json())
                        .then(data => {
                            this.historyEvents   = data.events      || [];
                            this.historyTotal    = data.total       || 0;
                            this.historyTotalPages = data.total_pages || 1;
                            this.historyLoading  = false;
                        })
                        .catch(() => { this.historyLoading = false; });
                },

                onFilterChange() {
                    this.historyPage = 1;
                    clearTimeout(this._searchDebounce);
                    this._searchDebounce = setTimeout(() => this.queryHistory(1), 300);
                },

                // ── Lifecycle ───────────────────────────────────────────────
                connect() {
                    fetch('/api/version')
                        .then(res => res.json())
                        .then(data => {
                            this.edition = data.edition || 'pro';
                            const headerSpan = document.querySelector('header h1 span');
                            if (headerSpan && this.edition === 'lite') {
                                headerSpan.textContent = 'LITE';
                                headerSpan.className = 'text-slate-400';
                            }
                            if (this.edition === 'lite') {
                            }
                        })
                        .catch(err => console.warn("Could not load version info:", err));

                    // Initial load — loadSessions triggers queryHistory(1) once the
                    // session UUID is known, so no need to call queryHistory here.
                    this.loadSessions();
                    this.loadStats();
                    setInterval(() => this.loadStats(), 5000);
                    // Auto-refresh history every 10 s when the history tab is active.
                    setInterval(() => { if (this.activeTab === 'history') this.queryHistory(this.historyPage); }, 10000);

                    // Countdown ticker — decrements non-paused, non-decided pending requests
                    setInterval(() => {
                        this.pendingRequests = this.pendingRequests.map(r =>
                            (r._paused || r._decided || r.notification_only)
                                ? r
                                : { ...r, _remainingSecs: Math.max(0, r._remainingSecs - 1) }
                        );
                    }, 1000);

                    const wsPort = window.location.port || 3000;
                    const ws = new WebSocket(`ws://${window.location.hostname}:${wsPort}/ws`);
                    ws.onopen = () => console.log("CONNECTED TO SERVER!");
                    ws.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);

                        if (data.type === 'PENDING') {
                            this.pendingRequests.unshift({
                                ...data,
                                _remainingSecs: data.timeout_secs || 30,
                                _paused: false,
                                _decided: false,
                                _frozen: false,
                                _frozenAt: null,
                            });
                            return;
                        }

                        if (data.type === 'CGROUP_FROZEN') {
                            const req = this.pendingRequests.find(r => r.event_id === data.event_id);
                            if (req) { req._frozen = true; req._frozenAt = Date.now(); }
                            return;
                        }

                        if (data.type === 'DECIDED') {
                            const req = this.pendingRequests.find(r => r.event_id === data.event_id);
                            if (req) {
                                req._decided = true;
                                req._decisionAction = data.action;
                                req._frozen = false;
                                setTimeout(() => {
                                    this.pendingRequests = this.pendingRequests.filter(r => r.event_id !== data.event_id);
                                }, 2000);
                            }
                            return;
                        }

                        if (data.type === 'SESSION_KILLED') {
                            this.pendingRequests = [];
                            return;
                        }

                        if (data.type === 'PAUSED') {
                            const req = this.pendingRequests.find(r => r.event_id === data.event_id);
                            if (req) req._paused = data.paused;
                            return;
                        }

                        this._addLive(data);
                        if (data.lane === 'RED') this.selected = data;
                        // Keep history tab in sync — debounced so rapid events don't spam.
                        if (this.activeTab === 'history') {
                            clearTimeout(this._historyRefreshDebounce);
                            this._historyRefreshDebounce = setTimeout(() => this.queryHistory(this.historyPage), 500);
                        }
                    };
                    ws.onclose = () => {
                        console.log("Disconnected. Retrying...");
                        setTimeout(() => this.connect(), 1000);
                    };
                },

                // ── Intervention actions ────────────────────────────────────
                decide(eventId, action) {
                    const req = this.pendingRequests.find(r => r.event_id === eventId);
                    if (req) { req._decided = true; req._decisionAction = action; }
                    fetch('/api/decide', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ event_id: eventId, action })
                    })
                    .then(r => { if (!r.ok && req) req._decided = false; })
                    .catch(() => { if (req) req._decided = false; });
                },

                togglePause(eventId) {
                    const req = this.pendingRequests.find(r => r.event_id === eventId);
                    if (!req) return;
                    const newPaused = !req._paused;
                    req._paused = newPaused;
                    fetch('/api/pause', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ event_id: eventId, paused: newPaused })
                    })
                    .catch(() => { if (req) req._paused = !newPaused; });
                }
            }
        }
    </script>

    <style>
        body { background-color: #050a14; color: #cbd5e1; font-family: 'Courier New', monospace; }
        .cyber-border { border: 1px solid #1e293b; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .scan-line {
            width: 100%; height: 2px; background: rgba(34, 211, 238, 0.3);
            position: absolute; top: 0; left: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan { 0% {top: 0%;} 100% {top: 100%;} }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 6px; border: 2px solid #0f172a; }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden" x-data="watchtower()" x-init="connect()">

    <header class="h-16 border-b border-slate-800 bg-slate-950 flex items-center justify-between px-6 z-10 relative">
        <div class="flex items-center gap-4">
            <div class="h-8 w-8 bg-cyan-900 rounded flex items-center justify-center text-cyan-400 font-bold border border-cyan-700">S</div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-widest">SEVORIX <span class="text-cyan-500">PRIME</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em]">Runtime Containment Engine</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <!-- Current session metadata -->
            <div x-show="currentSessionName" class="flex flex-col items-end">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest">Session</span>
                <div class="flex items-center gap-1">
                    <span class="text-xs text-cyan-300 font-mono font-bold" x-text="currentSessionName"></span>
                    <span class="text-[10px] text-slate-600">:</span>
                    <span class="text-xs text-slate-400 font-mono" x-text="currentSessionPort"></span>
                </div>
                <div x-show="currentSessionRole" class="text-[10px] text-amber-400 font-mono uppercase tracking-wide" x-text="'role: ' + currentSessionRole"></div>
            </div>
            <!-- Running sessions count badge (when multiple) -->
            <div x-show="runningSessionsCount > 1" class="flex flex-col items-end">
                <span class="text-[10px] text-slate-500 uppercase tracking-widest">Running</span>
                <span class="text-xs text-cyan-500 font-mono" x-text="runningSessionsCount + ' sessions'"></span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-slate-500 uppercase">System Status</span>
                <div class="flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-xs text-green-400 font-bold">ONLINE / PROTECTED</span>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
        <div class="absolute inset-0 opacity-5" 
             style="background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px;"></div>

        <!-- ── INTERVENTION PANEL ─────────────────────────────────────────── -->
        <div x-show="pendingRequests.length > 0"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="absolute inset-x-0 top-0 z-50 bg-yellow-950/95 border-b border-yellow-500/50
                    backdrop-blur-sm shadow-[0_4px_30px_rgba(234,179,8,0.2)] p-4"
             style="display:none;">

            <div class="flex items-center gap-3 mb-3">
                <span class="h-2.5 w-2.5 rounded-full bg-yellow-400 animate-pulse"></span>
                <h2 class="text-xs font-bold text-yellow-300 uppercase tracking-widest">Awaiting Operator Decision</h2>
                <span class="ml-auto text-[10px] text-yellow-600 font-mono"
                      x-text="pendingRequests.length + ' pending'"></span>
            </div>

            <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
                <template x-for="req in pendingRequests" :key="req.event_id">
                    <div class="flex items-start gap-3 p-3 bg-yellow-900/30 border border-yellow-700/40 rounded">

                        <!-- Layer badge + info -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded border"
                                      :class="{
                                          'border-blue-600 text-blue-400 bg-blue-950/50': req.layer === 'network',
                                          'border-purple-600 text-purple-400 bg-purple-950/50': req.layer === 'shell',
                                          'border-orange-600 text-orange-400 bg-orange-950/50': req.layer === 'syscall',
                                      }"
                                      x-text="(req.layer || 'unknown').toUpperCase()"></span>
                                <span class="text-[11px] text-yellow-500 font-mono truncate"
                                      x-text="req.reason || 'Flagged by scanner'"></span>
                            </div>
                            <p class="text-sm text-slate-200 truncate font-mono" x-text="req.payload"></p>
                            <p class="text-[10px] text-slate-500 mt-0.5" x-text="req.timestamp"></p>
                        </div>

                        <!-- Countdown + action buttons -->
                        <div class="flex flex-col items-end gap-1.5 shrink-0">
                            <!-- Frozen indicator -->
                            <template x-if="req._frozen && !req._decided">
                                <span class="text-[10px] font-mono px-2 py-0.5 rounded border border-cyan-600 text-cyan-400 bg-cyan-950/40"
                                      title="Agent process suspended at kernel level">
                                    ❄ FROZEN
                                </span>
                            </template>
                            <!-- Countdown / status badge -->
                            <span class="text-xs font-mono px-2 py-0.5 rounded border transition-colors"
                                  :class="{
                                      'border-slate-600 text-slate-400': req._paused && !req._decided,
                                      'border-red-500 text-red-400 animate-pulse': !req._paused && !req._decided && req._remainingSecs <= 5,
                                      'border-yellow-600 text-yellow-400': !req._paused && !req._decided && req._remainingSecs > 5,
                                      'border-green-600 text-green-400': req._decided && req._decisionAction === 'allow',
                                      'border-red-700 text-red-400': req._decided && req._decisionAction === 'block',
                                  }"
                                  x-text="req._decided
                                      ? (req._decisionAction === 'allow' ? '✓ ALLOWED' : '✗ BLOCKED')
                                      : (req._paused ? '⏸ PAUSED' : req._remainingSecs + 's')">
                            </span>

                            <!-- Buttons — hidden after decision -->
                            <template x-if="!req._decided">
                                <div class="flex gap-1.5">
                                    <button @click="togglePause(req.event_id)"
                                            class="px-2 py-1 text-[11px] font-bold uppercase rounded border transition-all active:scale-95"
                                            :class="req._paused
                                                ? 'bg-yellow-900/60 border-yellow-600 text-yellow-300 hover:bg-yellow-500 hover:text-white'
                                                : 'bg-slate-800 border-slate-600 text-slate-400 hover:border-yellow-600 hover:text-yellow-300'"
                                            x-text="req._paused ? 'Resume' : 'Pause'">
                                    </button>
                                    <button @click="decide(req.event_id, 'allow')"
                                            class="px-2.5 py-1 text-[11px] font-bold uppercase rounded border
                                                   bg-green-900/50 border-green-700 text-green-400
                                                   hover:bg-green-500 hover:text-white transition-all active:scale-95">
                                        Allow
                                    </button>
                                    <button @click="decide(req.event_id, 'block')"
                                            class="px-2.5 py-1 text-[11px] font-bold uppercase rounded border
                                                   bg-red-900/50 border-red-700 text-red-400
                                                   hover:bg-red-500 hover:text-white transition-all active:scale-95">
                                        Block
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        <!-- ── END INTERVENTION PANEL ─────────────────────────────────────── -->

        <aside class="w-64 bg-slate-950 border-r border-slate-800 p-4 flex flex-col gap-6 z-10">
            <div class="cyber-border bg-slate-900/50 p-4 rounded relative overflow-hidden">
                <p class="text-xs text-slate-500 uppercase mb-1">Total Traffic</p>
                <h2 class="text-4xl font-bold text-white" x-text="stats.total">0</h2>
                <div class="flex gap-3 mt-2 text-[10px] font-mono">
                    <span class="text-cyan-400"><span x-text="stats.shell"></span> shell</span>
                    <span class="text-purple-400"><span x-text="stats.syscall"></span> syscall</span>
                    <span class="text-yellow-400"><span x-text="stats.network"></span> network</span>
                </div>
                <div class="absolute bottom-0 left-0 h-1 bg-blue-500 transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="cyber-border bg-slate-900/50 p-4 rounded relative overflow-hidden">
                <p class="text-xs text-slate-500 uppercase mb-1">Threats Blocked</p>
                <h2 class="text-4xl font-bold text-red-500" x-text="stats.blocked">0</h2>
                <div class="absolute bottom-0 left-0 h-1 bg-red-600 transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="cyber-border bg-slate-900/50 p-4 rounded relative overflow-hidden">
                <p class="text-xs text-slate-500 uppercase mb-1">Avg Latency</p>
                <h2 class="text-4xl font-bold text-yellow-400"><span x-text="stats.latency">0</span><span class="text-lg text-slate-500 ml-1">ms</span></h2>
            </div>

            

            
        </aside>

        <main class="flex-1 flex flex-col border-r border-slate-800 bg-slate-900/20 backdrop-blur-sm z-10 relative">
            <div class="scan-line pointer-events-none"></div>

            <!-- Tab bar + status -->
            <div class="p-3 bg-slate-900/80 border-b border-slate-800 flex items-center justify-between gap-4">
                <div class="flex gap-1">
                    <button @click="activeTab = 'history'"
                            :class="activeTab === 'history' ? 'bg-cyan-900 text-cyan-300 border-cyan-600' : 'text-slate-500 border-slate-700 hover:text-slate-300'"
                            class="px-3 py-1 text-xs font-bold uppercase tracking-wider border rounded transition-all">History</button>
                    <button @click="activeTab = 'live'"
                            :class="activeTab === 'live' ? 'bg-cyan-900 text-cyan-300 border-cyan-600' : 'text-slate-500 border-slate-700 hover:text-slate-300'"
                            class="px-3 py-1 text-xs font-bold uppercase tracking-wider border rounded transition-all">
                        Live
                        <span class="ml-1 h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse inline-block"></span>
                    </button>
                </div>
                <span class="text-xs text-slate-500 flex items-center gap-2" x-show="activeTab === 'history'">
                    <span x-text="historyTotal + ' events · page ' + historyPage + ' of ' + historyTotalPages"></span>
                    <button @click="queryHistory(historyPage)"
                            :disabled="historyLoading"
                            class="px-1.5 py-0.5 rounded border border-slate-700 text-slate-500 hover:text-slate-300 hover:border-slate-500 disabled:opacity-30 transition-all"
                            title="Refresh">↻</button>
                </span>
                <span class="text-xs text-slate-500" x-show="activeTab === 'live'"
                      x-text="liveEvents.length + ' live events (last ' + LIVE_PER_LAYER + ' per layer)'"></span>
            </div>

            <!-- Filter bar (history only) -->
            <div x-show="activeTab === 'history'"
                 class="px-4 py-2 bg-slate-950/60 border-b border-slate-800 flex flex-wrap items-center gap-4">
                <input type="text" x-model="search"
                       @input="onFilterChange()"
                       placeholder="Search payload, verdict, syscall…"
                       class="flex-1 min-w-[160px] px-3 py-1.5 rounded bg-slate-900 border border-slate-700 text-xs text-slate-300 placeholder-slate-600 focus:outline-none focus:ring-1 focus:ring-cyan-600" />
                <div class="flex items-center gap-4 text-xs">
                    <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <input type="checkbox" x-model="filters.shell"   @change="onFilterChange()" class="accent-cyan-500" />
                        <span class="text-cyan-400 font-semibold uppercase tracking-wide">Shell</span>
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <input type="checkbox" x-model="filters.syscall" @change="onFilterChange()" class="accent-purple-500" />
                        <span class="text-purple-400 font-semibold uppercase tracking-wide">Syscall</span>
                    </label>
                    <label class="flex items-center gap-1.5 cursor-pointer select-none">
                        <input type="checkbox" x-model="filters.network" @change="onFilterChange()" class="accent-yellow-500" />
                        <span class="text-yellow-400 font-semibold uppercase tracking-wide">Network</span>
                    </label>
                    <span class="text-slate-700 select-none">|</span>
                    <label class="flex items-center gap-1.5 cursor-pointer select-none"
                           title="Show only BLOCK (RED lane) events">
                        <input type="checkbox" x-model="showBlockedOnly"
                               @change="onFilterChange()"
                               class="accent-red-500" />
                        <span class="font-semibold uppercase tracking-wide"
                              :class="showBlockedOnly ? 'text-red-400' : 'text-slate-400'">Blocked Only</span>
                    </label>
                </div>
                <span x-show="historyLoading" class="text-xs text-slate-500 animate-pulse">Loading…</span>
            </div>

            <!-- Session switcher (history only) -->
            <div x-show="activeTab === 'history'"
                 class="px-4 py-1.5 bg-slate-950/40 border-b border-slate-800/60 flex items-center gap-2">
                <span class="text-[10px] text-slate-600 uppercase tracking-widest whitespace-nowrap">Session</span>
                <select x-model="selectedSession"
                        @change="historyPage = 1; queryHistory(1)"
                        :disabled="sessionsLoading || sessions.length === 0"
                        class="flex-1 px-2 py-1 rounded bg-slate-900 border border-slate-700 text-xs text-slate-300 focus:outline-none focus:ring-1 focus:ring-cyan-600 disabled:opacity-40">
                    <template x-for="s in sessions" :key="s.session_id">
                        <option :value="s.session_id"
                                x-text="sessionLabel(s)">
                        </option>
                    </template>
                </select>
                <span x-show="sessionsLoading" class="text-[10px] text-slate-600 animate-pulse">Loading…</span>
            </div>

            <!-- Event list -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3" id="feed-container">
                <template x-for="event in displayEvents" :key="event.timestamp + (event.pid || '')">
                    <div class="p-4 rounded border-l-4 bg-slate-900/90 hover:bg-slate-800 transition-all cursor-pointer group shadow-lg relative overflow-hidden"
                         :class="{
                            'border-red-500 shadow-red-900/20': event.lane === 'RED',
                            'border-yellow-400 shadow-yellow-900/20': event.lane === 'YELLOW',
                            'border-green-500 shadow-green-900/20': event.lane === 'GREEN'
                         }"
                         @click="selected = event">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-xl tracking-wider"
                                      :class="{
                                        'text-red-500': event.lane === 'RED',
                                        'text-yellow-400': event.lane === 'YELLOW',
                                        'text-green-500': event.lane === 'GREEN'
                                      }" x-text="event.verdict"></span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded uppercase font-bold tracking-widest"
                                      :class="{
                                        'bg-cyan-900/60 text-cyan-400':     (event.layer || 'shell') === 'shell',
                                        'bg-purple-900/60 text-purple-400': event.layer === 'syscall',
                                        'bg-yellow-900/60 text-yellow-400': event.layer === 'network'
                                      }"
                                      x-text="event.layer || 'shell'"></span>
                            </div>
                            <div class="flex items-baseline gap-1 font-mono"
                                 :class="{
                                    'text-red-500': event.lane === 'RED',
                                    'text-yellow-400': event.lane === 'YELLOW',
                                    'text-green-500 opacity-60': event.lane === 'GREEN'
                                  }">
                                <span class="text-sm">⚡</span>
                                <span class="text-2xl font-bold" x-text="event.latency"></span>
                                <span class="text-sm">ms</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end relative z-10">
                            <span class="text-base text-slate-300 truncate w-full pr-4 font-medium" x-text="event.payload"></span>
                            <span class="text-sm text-slate-500 font-mono whitespace-nowrap"
                                  x-text="(event.timestamp || '').split('T')[1]?.split('.')[0] || ''"></span>
                        </div>
                    </div>
                </template>
                <div x-show="displayEvents.length === 0 && !historyLoading"
                     class="text-center text-slate-600 text-sm py-12">No events match your filters.</div>
            </div>

            <!-- Pagination (history only) -->
            <div x-show="activeTab === 'history' && historyTotalPages > 1"
                 class="flex items-center justify-center gap-2 py-3 border-t border-slate-800 bg-slate-950/60">
                <button @click="queryHistory(historyPage - 1)" :disabled="historyPage <= 1"
                        class="px-3 py-1 text-xs border border-slate-700 rounded text-slate-400 hover:text-white hover:border-slate-500 disabled:opacity-30 disabled:cursor-not-allowed">← Prev</button>
                <span class="text-xs text-slate-500 font-mono"
                      x-text="historyPage + ' / ' + historyTotalPages"></span>
                <button @click="queryHistory(historyPage + 1)" :disabled="historyPage >= historyTotalPages"
                        class="px-3 py-1 text-xs border border-slate-700 rounded text-slate-400 hover:text-white hover:border-slate-500 disabled:opacity-30 disabled:cursor-not-allowed">Next →</button>
            </div>
        </main>

        <aside class="w-[400px] bg-slate-950 p-6 flex flex-col gap-4 z-10">
            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Payload Inspector</h3>
            <div class="flex-1 cyber-border bg-black p-5 rounded font-mono text-sm overflow-auto relative">
                <template x-if="selected">
                    <div>
                        <div class="flex justify-between mb-6 border-b border-slate-800 pb-3">
                            <span class="text-slate-500">VERDICT</span>
                            <span class="font-bold text-lg"
                                  :class="{
                                    'text-red-500': selected.verdict === 'BLOCK',
                                    'text-yellow-400': selected.verdict === 'FLAG',
                                    'text-green-500': selected.verdict === 'ALLOW'
                                  }" x-text="selected.verdict"></span>
                        </div>
                        <div class="flex justify-between mb-6 border-b border-slate-800 pb-3">
                            <span class="text-slate-500">LANE</span>
                            <span class="font-bold text-lg"
                                  :class="{
                                    'text-red-500': selected.lane === 'RED',
                                    'text-yellow-400': selected.lane === 'YELLOW',
                                    'text-green-500': selected.lane === 'GREEN'
                                  }" x-text="selected.lane"></span>
                        </div>
                        <div class="flex justify-between mb-6 border-b border-slate-800 pb-3">
                            <span class="text-slate-500">CONTEXT</span>
                            <span class="text-slate-300 text-lg font-mono" x-text="selected.context || 'N/A'"></span>
                        </div>
                        <div class="flex justify-between mb-6 border-b border-slate-800 pb-3">
                            <span class="text-slate-500">ROLE</span>
                            <span class="text-cyan-400 text-lg font-mono" x-text="selected.role || 'N/A'"></span>
                        </div>
                        <template x-if="selected.pid">
                            <div class="flex justify-between mb-6 border-b border-slate-800 pb-3">
                                <span class="text-slate-500">PID / PPID</span>
                                <span class="text-slate-300 text-lg font-mono">
                                    <span x-text="selected.pid"></span><template x-if="selected.ppid"><span> / <span x-text="selected.ppid"></span></span></template>
                                </span>
                            </div>
                        </template>
                        <div class="mb-6">
                            <span class="text-slate-500 block mb-2">TIMESTAMP</span>
                            <span class="text-white text-lg" x-text="selected.timestamp"></span>
                        </div>
                        <div class="mb-6">
                            <span class="text-slate-500 block mb-2">LATENCY</span>
                            <span class="text-cyan-400 font-bold text-2xl">⚡ <span x-text="selected.latency"></span>ms</span>
                        </div>
                        <template x-if="selected.reason">
                            <div class="mb-6">
                                <span class="text-slate-500 block mb-2">THREAT REASON</span>
                                <span class="text-red-400 text-lg italic" x-text="selected.reason"></span>
                            </div>
                        </template>

                        <div>
                            <span class="text-slate-500 block mb-2">PAYLOAD CONTENT</span>
                            <div class="p-4 bg-slate-900 rounded text-green-400 break-words border border-slate-800 text-base leading-relaxed shadow-inner font-medium">
                                <span x-text="selected.payload"></span>
                            </div>
                        </div>
                        
                    </div>
                </template>
                <template x-if="!selected">
                    <div class="h-full flex items-center justify-center text-slate-600 text-center opacity-50">
                        <p class="text-lg">Select an event<br>to inspect payload</p>
                    </div>
                </template>
            </div>
        </aside>
    </div>
</body>
</html>
